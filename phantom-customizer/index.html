<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phantom Customizer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-top: 20px;
    }

    #customizer {
      width: 400px;
      height: 400px;
      background: #2b2b2b;
      margin-top: 20px;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }

    .layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Phantom Customizer</h1>

  <div id="customizer">
    <!-- Layers will be controlled by JS -->
    <img id="body" class="layer">
    <img id="eyes" class="layer">
    <img id="accessory" class="layer">
  </div>

  <div id="controls">
    <button onclick="changeEyes()">Change Eyes</button>
    <button onclick="changeAccessory()">Change Accessory</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
