<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Phantom Customizer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #stage {
      width: 400px;
      height: 400px;
      margin: 20px auto;
      background: #2b2b2b;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
    }

    img {
      width: 200px;
      height: 200px;
    }

    button {
      padding: 10px 14px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Phantom Customizer</h1>

  <div id="stage">
    <img id="mainImage" src="https://placehold.co/300x300" />
    
    <button onclick="changeImage()">Next Image</button>
  </div>

  <script>
    let index = 1;

    function changeImage() {
      index++;
      document.getElementById("mainImage").src =
        "https://placehold.co/300x300?text=Image+" + index;
    }
  </script>

</body>
</html>
