<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phantom Customizer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 15px;
    }

    #stage {
      width: 400px;
      height: 400px;
      margin: 20px auto;
      position: relative;
      background: #2b2b2b;
      border-radius: 12px;
      overflow: hidden;
    }

    .layer {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      image-rendering: pixelated;
    }

    #controls {
      margin-top: 20px;
    }

    button {
      padding: 10px 14px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Phantom Customizer</h1>

  <div id="stage">

    <!-- BODY -->
    <img id="body" class="layer">
    <img id="bodyShine" class="layer">

    <!-- LEGS -->
    <img id="topLeg" class="layer">
    <img id="bottomLeg" class="layer">

    <!-- EYES -->
    <img id="eyeWhite" class="layer">
    <img id="iris" class="layer">
    <img id="eyeSparkle" class="layer">
    <img id="eyeFold" class="layer">

    <!-- STITCHES -->
    <img id="stitch1" class="layer">
    <img id="stitch2" class="layer">

    <!-- ACCESSORY -->
    <img id="accessory" class="layer">

  </div>

  <div id="controls">
    <button onclick="nextEyes()">Next Eyes</button>
    <button onclick="nextAccessory()">Next Accessory</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
